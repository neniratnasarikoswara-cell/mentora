<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mentora | English Proficiency Architect</title>
    <!-- Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-brand { font-family: 'Playfair Display', serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 20px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; border: 2px solid #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0px); } }
        .animate-float { animation: float 6s ease-in-out infinite; }
        .blueprint-table { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
        .blueprint-table th, .blueprint-table td { border: 1px solid #e2e8f0; padding: 8px; text-align: left; }
        .blueprint-table th { background-color: #f8fafc; font-weight: 800; text-transform: uppercase; }
    </style>
</head>
<body class="bg-[#F8FAFC]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                book: <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20M4 19.5A2.5 2.5 0 0 0 6.5 22H20M4 19.5V5A2.5 2.5 0 0 1 6.5 2.5H20v14.5" />,
                plus: <path d="M12 5v14M5 12h14" />,
                history: <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8m0 0V3m0 5h5" />,
                user: <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2M12 7a4 4 0 1 0 0-8 4 4 0 0 0 0 8z" />,
                school: <path d="M22 10v6M2 10l10-5 10 5-10 5zM6 12v5c0 2 2 3 6 3s6-1 6-3v-5" />,
                download: <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3" />,
                refresh: <path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15" />,
                shield: <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />,
                search: <><circle cx="11" cy="11" r="8" /><path d="m21 21-4.3-4.3" /></>,
                trash: <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M10 11v6M14 11v6" />,
                eye: <><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z" /><circle cx="12" cy="12" r="3" /></>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || null}
                </svg>
            );
        };

        const GRADES = ["Kelas 10", "Kelas 11", "Kelas 12"];
        const GENRES = ["Narrative", "Descriptive", "Recount", "Procedure", "Report", "Analytical Exposition", "Hortatory Exposition", "Discussion", "News Item", "Mixed (Multimodal)"];
        const QUESTION_COUNTS = [10, 15, 20, 25, 30, 35, 40];
        const ASSESSMENT_TYPES = ["Formative", "Summative"];

        function App() {
            const [activeView, setActiveView] = useState('generate');
            const [activeTab, setActiveTab] = useState('soal');
            const [loading, setLoading] = useState(false);
            const [formData, setFormData] = useState({
                teacherName: '',
                schoolName: '',
                grade: 'Kelas 10',
                numQuestions: 10,
                genre: 'Narrative',
                type: 'Summative'
            });
            const [result, setResult] = useState(null);
            const [error, setError] = useState(null);
            const [archive, setArchive] = useState([]);

            const apiKey = ""; // API Key injection point

            const generateQuestions = async () => {
                const systemPrompt = `You are Mentora, a professional English Assessment Architect.
                TASK: Generate a ${formData.type} English assessment for ${formData.grade}.
                GENRE: ${formData.genre}. TOTAL QUESTIONS: ${formData.numQuestions}.
                DEVELOPER: Ms. Neni Ratnasari - SMAN 1 Margaasih.
                
                STRICT RULES:
                1. Write full reading passages (300-450 words, B2/C1 level).
                2. Every 5 questions follow this sequence: Q1:Literal, Q2:Structural, Q3:Inferential, Q4:Evaluative, Q5:Reflective.
                3. Exactly 5 options (A-E) per question.
                4. Each question MUST end with "Answer: [Letter]" for the key extraction.
                5. DO NOT include the blueprint/table here. Only the passages and questions.
                6. Use clear headings for passages like === PASSAGE X ===.`;

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Create the assessment content (passages and questions) for ${formData.numQuestions} items.` }] }],
                        systemInstruction: { parts: [{ text: systemPrompt }] }
                    })
                });
                const data = await response.json();
                return data.candidates?.[0]?.content?.parts?.[0]?.text;
            };

            const generateBlueprint = async (soalContent) => {
                const systemPrompt = `You are an Indonesian Curriculum Specialist. 
                TASK: Generate an 8-column professional blueprint (Kisi-Kisi) table in Bahasa Indonesia based on the provided English assessment.
                COLUMNS: No | Capaian Pembelajaran | Tujuan Pembelajaran | Indikator | Level Kognitif | Bentuk Soal | Tingkat Kesulitan | Kunci Jawaban.
                
                STRICT RULES:
                1. TP and Indikator must be descriptive, formal, and pedagogical. 
                2. TP must explain the core competency.
                3. Indikator must use standard language: "Disajikan teks..., peserta didik dapat..."
                4. Match the exact number of questions provided.
                5. Return ONLY the Markdown table. No other text.`;

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Here are the questions: \n${soalContent}\n\nGenerate the 8-column blueprint table in Bahasa Indonesia.` }] }],
                        systemInstruction: { parts: [{ text: systemPrompt }] }
                    })
                });
                const data = await response.json();
                return data.candidates?.[0]?.content?.parts?.[0]?.text;
            };

            const handleGenerate = async () => {
                if (!formData.teacherName || !formData.schoolName) {
                    setError("Identity validation error: 'Nama Guru Penyusun' and 'Nama Sekolah' are required.");
                    return;
                }
                setLoading(true);
                setError(null);
                setResult(null);

                try {
                    const soal = await generateQuestions();
                    if (!soal) throw new Error("Failed to generate questions.");
                    
                    const kisi = await generateBlueprint(soal);
                    if (!kisi) throw new Error("Failed to generate blueprint.");

                    const newResult = {
                        id: Date.now(),
                        soal: soal,
                        kisi: kisi,
                        metadata: { ...formData, date: new Date().toLocaleDateString() }
                    };
                    setResult(newResult);
                    setArchive([newResult, ...archive]);
                    setActiveTab('soal');
                } catch (err) {
                    setError(err.message);
                } finally {
                    setLoading(false);
                }
            };

            const downloadDoc = (content, isBlueprint = false) => {
                const filename = isBlueprint ? "Kisi-Kisi" : "Soal-Asesmen";
                
                const blueprintStyles = `
                    @page { size: 29.7cm 21cm landscape; margin: 2cm; }
                    body { font-family: 'Times New Roman', serif; font-size: 8pt; line-height: 1.2; }
                    h1 { font-size: 14pt; text-align: center; text-transform: uppercase; font-weight: bold; margin-bottom: 15px; }
                    .c-table { border-collapse: collapse; width: 100%; table-layout: fixed; border: 1pt solid black; word-wrap: break-word; }
                    .c-table th, .c-table td { border: 1pt solid black; padding: 4px; vertical-align: top; }
                    .c-table th { background: #D9D9D9; text-align: center; font-weight: bold; }
                    .center { text-align: center; }
                    .col-0 { width: 3%; } .col-1 { width: 12%; } .col-2 { width: 15%; } .col-3 { width: 35%; } 
                    .col-4 { width: 8%; } .col-5 { width: 10%; } .col-6 { width: 10%; } .col-7 { width: 7%; }
                `;

                const questionStyles = `
                    @page { size: 21cm 29.7cm; margin: 2.5cm; }
                    body { font-family: 'Times New Roman', serif; font-size: 11pt; line-height: 1.5; text-align: justify; color: black; }
                    h1 { font-size: 14pt; text-align: center; text-transform: uppercase; font-weight: bold; margin-bottom: 25px; }
                    .passage-title { font-weight: bold; text-align: center; margin: 20px 0 10px 0; text-decoration: underline; }
                    .question-text { margin-top: 15px; margin-bottom: 5px; text-align: justify; }
                    .option-row { margin-left: 20px; margin-bottom: 2px; }
                `;

                const header = `
                    <html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
                    <head><meta charset='utf-8'>
                    <style>
                        ${isBlueprint ? blueprintStyles : questionStyles}
                        .id-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
                        .id-table td { padding: 1px 0; font-weight: bold; font-size: ${isBlueprint ? '9pt' : '11pt'}; vertical-align: top; }
                        .id-label { width: 120px; text-align: left; }
                        .id-sep { width: 20px; text-align: center; }
                        .key-section { margin-top: 30px; border-top: 1pt solid black; padding-top: 10px; font-weight: bold; }
                    </style>
                    </head><body>`;
                
                const identityTable = `
                    <table class="id-table">
                        <tr><td class="id-label">Penyusun</td><td class="id-sep">:</td><td>${formData.teacherName}</td></tr>
                        <tr><td class="id-label">Sekolah</td><td class="id-sep">:</td><td>${formData.schoolName}</td></tr>
                        <tr><td class="id-label">Kelas</td><td class="id-sep">:</td><td>${formData.grade}</td></tr>
                        <tr><td class="id-label">Jenis Teks</td><td class="id-sep">:</td><td>${formData.genre}</td></tr>
                        <tr><td class="id-label">Tipe Asesmen</td><td class="id-sep">:</td><td>${formData.type}</td></tr>
                    </table>`;

                let body = "";
                
                if (isBlueprint) {
                    body += `<h1>KISI-KISI ASESMEN</h1>` + identityTable;
                    const rows = content.split('\n').filter(r => r.includes('|'));
                    body += `<table class="c-table">`;
                    rows.forEach((row, i) => {
                        if (i === 1) return;
                        const cells = row.split('|').filter(c => c.trim());
                        const tag = i === 0 ? 'th' : 'td';
                        if (cells.length < 2) return;
                        body += "<tr>" + cells.map((c, ci) => {
                            let alignmentClass = (i > 0 && [0, 4, 5, 6, 7].includes(ci)) ? 'center' : '';
                            return `<${tag} class="${alignmentClass} col-${ci}">${c.trim()}</${tag}>`;
                        }).join('') + "</tr>";
                    });
                    body += `</table>`;
                } else {
                    body += `<h1>SOAL ASESMEN BAHASA INGGRIS</h1>` + identityTable;
                    const lines = content.split('\n');
                    let answerKeys = [];

                    lines.forEach(line => {
                        const trimmed = line.trim();
                        if (!trimmed) return;
                        if (trimmed.startsWith('=== PASSAGE')) {
                            body += `<div class="passage-title">${trimmed.replace(/=/g, '').trim()}</div>`;
                        } else if (trimmed.match(/^Q\d+:/) || trimmed.match(/^\d+\./)) {
                            body += `<div class="question-text">${trimmed}</div>`;
                        } else if (trimmed.match(/^[A-E]\./)) {
                            body += `<div class="option-row">${trimmed}</div>`;
                        } else if (trimmed.startsWith('Answer:')) {
                            const key = trimmed.split(':')[1]?.trim();
                            if (key) answerKeys.push(key);
                        } else {
                            body += `<p style="margin: 0 0 10px 0; text-align: justify;">${trimmed}</p>`;
                        }
                    });

                    if (answerKeys.length > 0) {
                        body += `<div class="key-section">Kunci Jawaban:</div>`;
                        answerKeys.forEach((key, idx) => {
                            body += `<div>${idx + 1}. ${key}</div>`;
                        });
                    }
                }

                const blob = new Blob(['\ufeff', header + body + "</body></html>"], { type: 'application/msword' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `${filename}_${formData.genre}.doc`;
                link.click();
                URL.revokeObjectURL(link.href);
            };

            const renderBlueprintTable = (markdown) => {
                const rows = markdown.split('\n').filter(r => r.includes('|'));
                if (rows.length < 2) return <p className="p-8 text-slate-400 text-center italic">The blueprint format is being processed...</p>;
                const headers = rows[0].split('|').filter(c => c.trim());
                const dataRows = rows.slice(2);

                return (
                    <div className="overflow-x-auto">
                        <table className="blueprint-table">
                            <thead>
                                <tr>{headers.map((h, i) => <th key={i}>{h.trim()}</th>)}</tr>
                            </thead>
                            <tbody>
                                {dataRows.map((row, ri) => {
                                    const cells = row.split('|').filter(c => c.trim());
                                    if (cells.length < headers.length) return null;
                                    return (
                                        <tr key={ri}>
                                            {cells.map((cell, ci) => <td key={ci}>{cell.trim()}</td>)}
                                        </tr>
                                    );
                                })}
                            </tbody>
                        </table>
                    </div>
                );
            };

            return (
                <div className="min-h-screen flex flex-col lg:flex-row">
                    <aside className="w-full lg:w-64 bg-[#0F172A] text-slate-400 p-6 flex flex-col border-r border-slate-800 z-50">
                        <div className="flex items-center gap-3 mb-10">
                            <div className="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white shadow-xl">
                                <Icon name="book" size={24} />
                            </div>
                            <div>
                                <h1 className="text-xl font-black text-white tracking-tighter uppercase">Mentora</h1>
                                <p className="text-[10px] font-bold text-indigo-400 tracking-widest uppercase opacity-70">Assessment AI</p>
                            </div>
                        </div>
                        <nav className="flex-1 space-y-2">
                            <button onClick={() => setActiveView('generate')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all font-bold text-sm ${activeView === 'generate' ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-600/30' : 'hover:bg-slate-800/50 hover:text-slate-200'}`}>
                                <Icon name="plus" /> Generate
                            </button>
                            <button onClick={() => setActiveView('kelas')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all font-bold text-sm ${activeView === 'kelas' ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-600/30' : 'hover:bg-slate-800/50 hover:text-slate-200'}`}>
                                <Icon name="history" /> Archive
                            </button>
                        </nav>
                        <div className="mt-auto pt-6 border-t border-slate-800 space-y-4">
                            <div className="p-4 bg-indigo-900/20 rounded-2xl border border-indigo-500/20">
                                <p className="text-[10px] font-black text-indigo-400 uppercase tracking-widest mb-2 flex items-center gap-1"><Icon name="shield" size={12} /> Lead Dev</p>
                                <p className="text-xs font-bold text-white mb-1">Ms. Neni Ratnasari</p>
                                <p className="text-[10px] text-slate-500 font-medium">SMAN 1 Margaasih</p>
                            </div>
                        </div>
                    </aside>

                    <main className="flex-1 p-4 md:p-8 lg:p-12 overflow-y-auto max-h-screen custom-scrollbar pb-24">
                        {activeView === 'generate' && (
                            <div className="max-w-6xl mx-auto space-y-8 animate-in fade-in duration-700">
                                <header className="mb-8">
                                    <h2 className="text-3xl font-black text-slate-900 tracking-tight uppercase tracking-tighter">English Proficiency Architect</h2>
                                    <p className="text-slate-500 mt-2 font-medium italic">Empowering educators by Ms. Neni Ratnasari</p>
                                </header>

                                <div className="grid grid-cols-1 xl:grid-cols-12 gap-8">
                                    <div className="xl:col-span-4 space-y-6">
                                        <div className="bg-white p-6 rounded-[2rem] border border-slate-200 shadow-sm space-y-6">
                                            <div className="space-y-4">
                                                <div>
                                                    <label className="text-[10px] font-black text-slate-400 uppercase tracking-wider">Nama Guru Penyusun</label>
                                                    <input className="w-full mt-1 px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 font-bold" value={formData.teacherName} onChange={e => setFormData({...formData, teacherName: e.target.value})} placeholder="Masukkan nama..." />
                                                </div>
                                                <div>
                                                    <label className="text-[10px] font-black text-slate-400 uppercase tracking-wider">Nama Sekolah</label>
                                                    <input className="w-full mt-1 px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 font-bold" value={formData.schoolName} onChange={e => setFormData({...formData, schoolName: e.target.value})} placeholder="SMAN..." />
                                                </div>
                                                <div className="grid grid-cols-2 gap-4">
                                                    <div>
                                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-wider">Kelas</label>
                                                        <select className="w-full mt-1 px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl font-bold" value={formData.grade} onChange={e => setFormData({...formData, grade: e.target.value})}>
                                                            {GRADES.map(g => <option key={g}>{g}</option>)}
                                                        </select>
                                                    </div>
                                                    <div>
                                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-wider">Jumlah Soal</label>
                                                        <select className="w-full mt-1 px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl font-bold" value={formData.numQuestions} onChange={e => setFormData({...formData, numQuestions: e.target.value})}>
                                                            {QUESTION_COUNTS.map(c => <option key={c}>{c}</option>)}
                                                        </select>
                                                    </div>
                                                </div>
                                                <div>
                                                    <label className="text-[10px] font-black text-slate-400 uppercase tracking-wider">Jenis Teks</label>
                                                    <select className="w-full mt-1 px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl font-bold" value={formData.genre} onChange={e => setFormData({...formData, genre: e.target.value})}>
                                                        {GENRES.map(g => <option key={g}>{g}</option>)}
                                                    </select>
                                                </div>
                                            </div>
                                            <button onClick={handleGenerate} disabled={loading} className="w-full py-4 bg-indigo-600 text-white rounded-3xl font-black text-lg shadow-xl shadow-indigo-200 hover:bg-indigo-700 active:scale-95 transition-all disabled:opacity-50">
                                                {loading ? "ARCHITECTING..." : "GENERATE ASSESSMENT"}
                                            </button>
                                            {error && <p className="text-rose-500 text-[10px] font-bold text-center mt-2">{error}</p>}
                                        </div>
                                    </div>

                                    <div className="xl:col-span-8">
                                        {!result && !loading ? (
                                            <div className="h-full min-h-[400px] border-2 border-dashed border-slate-200 rounded-[3rem] flex flex-col items-center justify-center text-slate-300">
                                                <Icon name="search" size={48} className="mb-4" />
                                                <p className="font-bold uppercase tracking-widest text-sm">Evaluation Staging</p>
                                            </div>
                                        ) : loading ? (
                                            <div className="h-full min-h-[400px] bg-white rounded-[3rem] border border-slate-200 shadow-sm flex flex-col items-center justify-center space-y-4 text-center p-8">
                                                <div className="w-16 h-16 border-4 border-indigo-100 border-t-indigo-600 rounded-full animate-spin"></div>
                                                <h3 className="font-black text-indigo-900 uppercase tracking-widest animate-pulse">Mentora is Architecting</h3>
                                                <p className="text-slate-400 text-xs max-w-xs">Generating reading passages and mapping pedagogical standards...</p>
                                            </div>
                                        ) : (
                                            <div className="space-y-6">
                                                <div className="flex bg-white p-1.5 rounded-2xl border border-slate-200 shadow-sm w-fit">
                                                    <button onClick={() => setActiveTab('soal')} className={`px-10 py-2.5 rounded-xl font-black text-xs transition-all uppercase tracking-widest ${activeTab === 'soal' ? 'bg-slate-900 text-white shadow-lg' : 'text-slate-400 hover:text-slate-600'}`}>SOAL</button>
                                                    <button onClick={() => setActiveTab('kisi')} className={`px-10 py-2.5 rounded-xl font-black text-xs transition-all uppercase tracking-widest ${activeTab === 'kisi' ? 'bg-slate-900 text-white shadow-lg' : 'text-slate-400 hover:text-slate-600'}`}>KISI-KISI</button>
                                                </div>
                                                <div className="bg-white rounded-[3rem] border border-slate-200 shadow-xl overflow-hidden">
                                                    <div className="p-8 md:p-12 h-[600px] overflow-y-auto custom-scrollbar">
                                                        {activeTab === 'soal' ? (
                                                            <div className="text-justify leading-[1.8] font-sans whitespace-pre-line text-slate-800 selection:bg-indigo-100 inter-character">{result.soal}</div>
                                                        ) : (
                                                            <div className="min-w-full">{renderBlueprintTable(result.kisi)}</div>
                                                        )}
                                                    </div>
                                                    <div className="p-6 bg-slate-50 border-t border-slate-100 flex flex-col sm:flex-row gap-4">
                                                        <button onClick={() => downloadDoc(result.soal)} className="flex-1 py-4 bg-white border border-slate-200 rounded-2xl font-black text-[10px] flex items-center justify-center gap-2 hover:bg-slate-100 transition-all uppercase tracking-widest shadow-sm"><Icon name="download" size={16} /> DOWNLOAD SOAL (.DOC)</button>
                                                        <button onClick={() => downloadDoc(result.kisi, true)} className="flex-1 py-4 bg-white border border-slate-200 rounded-2xl font-black text-[10px] flex items-center justify-center gap-2 hover:bg-slate-100 transition-all uppercase tracking-widest shadow-sm"><Icon name="download" size={16} /> DOWNLOAD KISI-KISI (.DOC)</button>
                                                    </div>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeView === 'kelas' && (
                            <div className="max-w-6xl mx-auto animate-in slide-in-from-right-4 duration-500">
                                <h2 className="text-3xl font-black text-slate-900 mb-8 tracking-tighter uppercase">Assessment Archive</h2>
                                {archive.length === 0 ? (
                                    <div className="py-20 text-center text-slate-300 font-bold uppercase tracking-widest border-2 border-dashed border-slate-200 rounded-[3rem]">The vault is empty</div>
                                ) : (
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                        {archive.map(item => (
                                            <div key={item.id} className="bg-white p-6 rounded-[2.5rem] border border-slate-200 shadow-sm hover:shadow-xl transition-all group relative overflow-hidden border-b-4 border-b-indigo-500">
                                                <div className="flex justify-between mb-4">
                                                    <span className="bg-indigo-50 text-indigo-600 px-4 py-1 rounded-full text-[10px] font-black uppercase tracking-widest border border-indigo-100">{item.metadata.genre}</span>
                                                    <button onClick={() => setArchive(archive.filter(i => i.id !== item.id))} className="text-slate-300 hover:text-rose-500 p-1"><Icon name="trash" size={18} /></button>
                                                </div>
                                                <h3 className="font-black text-slate-900 truncate mb-1 leading-tight text-lg">{item.metadata.schoolName}</h3>
                                                <p className="text-[10px] text-slate-500 font-bold uppercase tracking-widest mb-6">{item.metadata.date}</p>
                                                <div className="flex gap-2">
                                                    <button onClick={() => {setResult(item); setFormData(item.metadata); setActiveView('generate'); setActiveTab('soal');}} className="flex-1 py-3 bg-slate-900 text-white rounded-2xl text-[10px] font-black uppercase tracking-widest flex items-center justify-center gap-2 shadow-lg hover:bg-black transition-colors"><Icon name="eye" size={14} /> Preview</button>
                                                    <button onClick={() => downloadDoc(item.soal)} className="p-3 bg-slate-50 rounded-2xl hover:bg-slate-200 transition-all border border-slate-100"><Icon name="download" size={18} /></button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}
                    </main>

                    <footer className="fixed bottom-0 left-0 lg:left-64 right-0 p-3 bg-white/90 backdrop-blur-md border-t border-slate-200 z-40 text-center flex flex-col md:flex-row justify-between items-center px-8 gap-2">
                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest italic">Linguistic Assessment Architect | Powered by Gemini 2.5</p>
                        <p className="text-[10px] font-black text-indigo-600 uppercase tracking-widest">© 2024 Neni Ratnasari - SMAN 1 Margaasih</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
